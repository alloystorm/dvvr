# Centralised navigation link sets.
# Layouts use these as locale-aware defaults via:
#   page.nav_links | default: site.data.nav_links.dancexr[page.locale]
#
# Pages that need a custom nav can still override with `nav_links:` in front matter.

# ── DanceXR product pages (home / release / feature layouts) ──────────────────
dancexr:
  en-US:
    - label: Getting Started
      url: /dancexr/getting-started
    - label: Features
      url: /dancexr/features
    - label: Releases
      url: /dancexr/releases
    - label: Download
      url: /dancexr/download
    - label: Support
      url: /dancexr/support
  ja-JP:
