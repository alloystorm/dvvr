{% assign tile = include.tile %}{% if tile.link %}<a href="{{ tile.link }}" class="feature-tile">{% else %}<div class="feature-tile feature-tile--disabled">{% endif %}<div class="feature-tile-img" style="background-image: url('{% if tile.image %}{{ tile.image }}{% else %}/images/slideshows/dancexr/logo-black.jpg{% endif %}');"></div><div class="feature-tile-body"><span class="feature-tile-name">{{ tile.title | escape }}</span>{% if tile.badge %}<span class="feature-tile-badge{% if tile.badge_type %} feature-tile-badge--{{ tile.badge_type }}{% endif %}">{{ tile.badge | escape }}</span>{% endif %}</div>{% if tile.link %}</a>{% else %}</div>{% endif %}
